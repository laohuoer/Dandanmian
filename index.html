<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DamDam 相册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <!-- GitHub Pages SPA routing: restore path from 404.html redirect -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) {
          // Remove the redirect param from URL and navigate to the original path
          var newUrl = window.location.origin + window.location.pathname.replace(/\/$/, '') + '/../' + redirect;
          // Use history API to replace the URL without reloading
          var basePath = '/Dandanmian';
          var targetPath = basePath + '/' + redirect;
          window.history.replaceState(null, null, targetPath);
        }
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
